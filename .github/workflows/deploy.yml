name: Deploy to FTP

on:
  push:
    branches: [ master ]   # is branch pe push hote hi deploy
  workflow_dispatch:        # manually "Run workflow" button se bhi chalega

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- PHP + Composer ----------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Prepare .env (sirf build ke liye, server pe upload nahi hoga)
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Generate app key (build ke liye)
        run: php artisan key:generate

      # ---------- Node + Vite build ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build assets (Vite + Tailwind)
        run: |
          npm install
          npm run build

      # ---------- FTP Upload (lftp — handles cPanel/Pure-FTPd explicit FTPS
      #            + TLS session reuse, jisse SamKirkland action fail hota tha) ----------
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTPS (lftp)
        env:
          FTP_HOST: ftp.hmhmotorsindustry.com
          FTP_USERNAME: hmhmotors
          LFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # ----- VENDOR TOGGLE -----
          # Abhi vendor/ deploy se skip hai (tum manually upload karoge — fast).
          # Site live hone ke baad neeche wali line ke aage '#' laga do (comment),
          # taaki future deploys composer ka vendor/ bhi upload karein.
          VENDOR_SKIP="--exclude ^vendor/"

          lftp -u "$FTP_USERNAME" --env-password "$FTP_HOST" <<EOF
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:ssl-protect-list true
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set ftp:use-pasv-address no
          set ftp:prefer-epsv no
          set net:max-retries 5
          set net:timeout 30
          set net:reconnect-interval-base 5
          mirror --reverse --verbose --no-perms $VENDOR_SKIP --exclude '^\.git' --exclude '^node_modules/' --exclude '^tests/' --exclude '^\.env' --exclude '^storage/' ./ /public_html/
          bye
          EOF
